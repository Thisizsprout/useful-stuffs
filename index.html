<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UtiliTools - 일상의 감성 도구</title>
    <style>
        /* 🎨 트렌디 비비드 글래스모피즘 (Vivid Glassmorphism Theme) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: #1e293b; /* Slate 800 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* 아기자기한 배경 그라데이션 광채 조명 */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(147, 197, 253, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(247, 185, 232, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
        }

        header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 18px 40px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #2563eb, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 50px 20px;
            flex: 1;
        }

        /* 🏠 1. 시작 화면 & 카드 메커니즘 */
        .dashboard-intro {
            text-align: center;
            margin-bottom: 50px;
        }

        .dashboard-intro h2 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .dashboard-intro p {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
        }

        /* 호버 시 팝업 카드 효과 */
        .tool-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(37, 99, 235, 0.2);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.1);
        }

        .tool-icon {
            font-size: 3.2rem;
            margin-bottom: 18px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .tool-card:hover .tool-icon {
            transform: rotate(-10deg) scale(1.1);
        }

        .tool-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .tool-card p {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.4;
        }

        /* 🛠️ 2. 도구 실행 워크스페이스 */
        .workspace {
            display: none;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
            animation: cubicBezierFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .back-btn {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 10px 22px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 30px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background-color: #e2e8f0;
            color: #1e293b;
            transform: translateX(-3px);
        }

        @keyframes cubicBezierFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------------------------------------------------- */
        /* [도구 1] 계산기 - 화사한 파스텔 감성 라이트 모드로 재도색 */
        /* ---------------------------------------------------- */
        .calc-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .calculator {
            background: rgba(248, 250, 252, 0.9);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .display-container {
            width: 100%;
            height: 90px;
            background-color: #ffffff;
            border-radius: 18px;
            margin-bottom: 25px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            overflow-x: auto;          
            overflow-y: hidden;        
            cursor: grab; 
            scroll-behavior: smooth;
            border: 1px solid #e2e8f0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .display-container:active { cursor: grabbing; }
        .display-container::-webkit-scrollbar { display: none; }
        
        .display {
            color: #0f172a;
            font-size: 2.3rem;
            font-weight: 600;
            white-space: nowrap; 
            display: block;
            width: 100%;
            text-align: right;
            transition: all 0.1s ease;
        }
        .push-animation {
            animation: textPush 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
        }
        @keyframes textPush {
            0% { transform: scale(0.97) translateX(4px); filter: brightness(0.8); }
            100% { transform: scale(1) translateX(0); filter: brightness(1); }
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .buttons button {
            padding: 20px;
            border-radius: 18px;
            border: none;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            background-color: #ffffff;
            color: #334155;
            user-select: none;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .buttons button:hover {
            transform: translateY(-4px);
            background-color: #f8fafc;
            box-shadow: 0 8px 15px rgba(0,0,0,0.06);
        }
        .buttons button:active {
            transform: translateY(1px) scale(0.96);
            background-color: #f1f5f9;
        }
        /* 파스텔톤 시그니처 배색 */
        .buttons button.operator { background-color: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
        .buttons button.operator:hover { background-color: #dbeafe; }
        
        .buttons button.clear { background-color: #fef2f2; color: #ef4444; border-color: #fecaca; }
        .buttons button.clear:hover { background-color: #fee2e2; }
        
        .buttons button.equal { 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
            color: white; 
            grid-column: span 2; 
            border: none;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .buttons button.equal:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        /* ---------------------------------------------------- */
        /* [도구 2, 3, 4] 입력 폼 및 컴포넌트 라이트 모드 디자인 */
        /* ---------------------------------------------------- */
        .tool-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 800;
            color: #0f172a;
        }
        textarea, input[type="text"], input[type="date"] {
            width: 100%;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            color: #0f172a;
            padding: 16px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
            transition: all 0.2s;
        }
        textarea:focus, input:focus { 
            border-color: #2563eb; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        
        /* 글자수 카운터 */
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .counter-box {
            background-color: #ffffff;
            padding: 22px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .counter-box p-label {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 600;
        }
        .counter-box span {
            display: block;
            font-size: 2.2rem;
            font-weight: 800;
            color: #2563eb;
            margin-top: 8px;
        }

        /* 액션 버튼 */
        .action-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
            transition: all 0.2s;
        }
        .action-btn:hover { 
            background: linear-gradient(135deg, #3730a3 0%, #1d4ed8 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.3);
        }
        
        /* 반짝이는 대시 박스 결과창 */
        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 18px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
            border: 2px dashed #cbd5e1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="showHome()">✨ UtiliTools</h1>
        <p style="color: #64748b; font-weight: 600;">v1.2.0</p>
    </header>

    <div class="container">
        <!-- 🏠 [화면 1] 메인 대시보드 (화사한 파스텔 카드 스타일) -->
        <div id="home-view">
            <div class="dashboard-intro">
                <h2>오늘의 일상을 더 가볍게</h2>
                <p>필요한 도구를 클릭해 바로 사용해 보세요.</p>
            </div>
            
            <div class="tool-grid">
                <div class="tool-card" onclick="openTool('calculator-tool')">
                    <span class="tool-icon">🧮</span>
                    <h3>스마트 계산기</h3>
                    <p>쫀득한 타격감을 구현한 감성 수식 계산기</p>
                </div>
                <div class="tool-card" onclick="openTool('counter-tool')">
                    <span class="tool-icon">✍️</span>
                    <h3>글자수 세기</h3>
                    <p>공백 포함 및 제외 실시간 글자 분석기</p>
                </div>
                <div class="tool-card" onclick="openTool('dday-tool')">
                    <span class="tool-icon">📅</span>
                    <h3>D-Day 계산기</h3>
                    <p>소중한 기념일과 시험 일정 카운트다운</p>
                </div>
                <div class="tool-card" onclick="openTool('picker-tool')">
                    <span class="tool-icon">🎰</span>
                    <h3>랜덤 추첨기</h3>
                    <p>메뉴 선택과 순번을 정하는 미니 슬롯</p>
                </div>
            </div>
        </div>

        <!-- 🛠️ [화면 2] 도구 실행 영역 (글래스모피즘 컨테이너) -->
        <div id="workspace-view" class="workspace">
            <button class="back-btn" onclick="showHome()">← 메인 뷰로 이동</button>
            
            <!-- [도구 1] 계산기 본체 (라이트 모드로 완전 변경) -->
            <div id="calculator-tool" class="tool-content" style="display:none;">
                <div class="calc-wrapper">
                    <div class="calculator">
                        <div class="display-container" id="display-container">
                            <div class="display" id="result">0</div>
                        </div>
                        <div class="buttons">
                            <button class="clear" onclick="clearDisplay()">C</button>
                            <button class="operator" onclick="appendValue('/')">÷</button>
                            <button class="operator" onclick="appendValue('*')">×</button>
                            <button class="operator" onclick="appendValue('-')">-</button>
                            
                            <button onclick="appendValue('7')">7</button>
                            <button onclick="appendValue('8')">8</button>
                            <button onclick="appendValue('9')">9</button>
                            <button class="operator" onclick="appendValue('+')">+</button>
                            
                            <button onclick="appendValue('4')">4</button>
                            <button onclick="appendValue('5')">5</button>
                            <button onclick="appendValue('6')">6</button>
                            <button onclick="appendValue('.')">.</button>
                            
                            <button onclick="appendValue('1')">1</button>
                            <button onclick="appendValue('2')">2</button>
                            <button onclick="appendValue('3')">3</button>
                            <button onclick="appendValue('0')">0</button>
                            
                            <button class="equal" onclick="calculate()">=</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- [도구 2] 글자수 세기 -->
            <div id="counter-tool" class="tool-content" style="display:none;">
                <div class="tool-title">✍️ 실시간 글자수 세기</div>
                <textarea id="counter-input" rows="8" placeholder="문장을 자유롭게 입력해 주세요..." oninput="countText()"></textarea>
                <div class="counter-grid">
                    <div class="counter-box"><div class="p-label">공백 포함</div><span id="char-with-space">0</span></div>
                    <div class="counter-box"><div class="p-label">공백 제외</div><span id="char-without-space">0</span></div>
                </div>
            </div>

            <!-- [도구 3] D-Day 계산기 -->
            <div id="dday-tool" class="tool-content" style="display:none;">
                <div class="tool-title">📅 디데이 계산기</div>
                <input type="date" id="target-date" onchange="calculateDDay()">
                <div class="result-box" id="dday-result">날짜를 설정하면 카운트다운이 시작됩니다.</div>
            </div>

            <!-- [도구 4] 랜덤 추첨기 -->
            <div id="picker-tool" class="tool-content" style="display:none;">
                <div class="tool-title">🎰 무작위 랜덤 추첨기</div>
                <textarea id="picker-items" rows="5" placeholder="예: 떡볶이, 치킨, 피자, 마라탕&#10;팀장, 부팀장, 조원"></textarea>
                <button class="action-btn" onclick="pickRandom()">🎯 행운의 아이템 추첨하기</button>
                <div class="result-box" id="picker-result">최종 낙점될 주인공은 누구일까요?</div>
            </div>
        </div>
    </div>

    <script>
        /* ---------------------------------------------------- */
        /* 🔄 [라우팅] 화면 제어 로직 */
        /* ---------------------------------------------------- */
        const homeView = document.getElementById('home-view');
        const workspaceView = document.getElementById('workspace-view');
        const toolContents = document.querySelectorAll('.tool-content');

        function showHome() {
            workspaceView.style.display = 'none';
            homeView.style.display = 'block';
            toolContents.forEach(tool => tool.style.display = 'none');
        }

        function openTool(toolId) {
            homeView.style.display = 'none';
            workspaceView.style.display = 'block';
            toolContents.forEach(tool => tool.style.display = 'none');
            document.getElementById(toolId).style.display = 'block';

            if(toolId === 'calculator-tool') {
                renderDisplay(fullExpression);
                autoScrollToRight();
            }
        }

        /* ---------------------------------------------------- */
        /* [도구 1] 계산기 비즈니스 로직 */
        /* ---------------------------------------------------- */
        const display = document.getElementById('result');
        const container = document.getElementById('display-container');
        let fullExpression = '0'; 

        function autoScrollToRight() {
            if(container) {
                requestAnimationFrame(() => { container.scrollLeft = container.scrollWidth; });
            }
        }

        function triggerAnimation() {
            display.classList.remove('push-animation');
            void display.offsetWidth; 
            display.classList.add('push-animation');
        }

        function renderDisplay(text) {
            let viewText = text.replace(/\*/g, '×').replace(/\//g, '÷');
            display.textContent = viewText;
            triggerAnimation(); 
        }

        function appendValue(value) {
            if (fullExpression === '0' && value !== '.') fullExpression = value;
            else fullExpression += value;
            renderDisplay(fullExpression);
            autoScrollToRight();
        }

        function clearDisplay() {
            fullExpression = '0';
            renderDisplay(fullExpression);
            autoScrollToRight();
        }

        function backspace() {
            if (fullExpression.length > 1) fullExpression = fullExpression.slice(0, -1);
            else fullExpression = '0';
            renderDisplay(fullExpression);
            autoScrollToRight();
        }

        function calculate() {
            try {
                if (fullExpression) {
                    let result = eval(fullExpression);
                    if (!isNaN(result) && Math.abs(result) >= 1e12) {
                        fullExpression = BigInt(Math.floor(result)).toString();
                    } else if (result % 1 !== 0) {
                        fullExpression = parseFloat(result.toFixed(8)).toString();
                    } else {
                        fullExpression = result.toString();
                    }
                    renderDisplay(fullExpression);
                }
            } catch (error) {
                fullExpression = '0';
                display.textContent = 'Error';
                setTimeout(clearDisplay, 1500);
            }
            autoScrollToRight();
        }

        // 스크롤 및 드래그 제어
        container.addEventListener('wheel', (evt) => { evt.preventDefault(); container.scrollLeft += evt.deltaY; });
        let isDown = false, startX, scrollLeft;
        container.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - container.offsetLeft; scrollLeft = container.scrollLeft; });
        container.addEventListener('mouseleave', () => { isDown = false; });
        container.addEventListener('mouseup', () => { isDown = false; });
        container.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - container.offsetLeft;
            const walk = (x - startX) * 1.5; 
            container.scrollLeft = scrollLeft - walk;
        });

        // 글로벌 키보드 핸들러
        document.addEventListener('keydown', function(event) {
            if (document.getElementById('calculator-tool').style.display === 'none') return;
            if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;

            const key = event.key;
            if ((key >= '0' && key <= '9') || key === '.') appendValue(key);
            else if (key === '+' || key === '-' || key === '*' || key === '/') appendValue(key);
            else if (key === 'Enter' || key === '=') { event.preventDefault(); calculate(); }
            else if (key === 'Backspace') backspace();
            else if (key === 'Escape') clearDisplay();
        });

        /* ---------------------------------------------------- */
        /* [도구 2] 글자수 세기 로직 */
        /* ---------------------------------------------------- */
        function countText() {
            const text = document.getElementById('counter-input').value;
            document.getElementById('char-with-space').textContent = text.length;
            document.getElementById('char-without-space').textContent = text.replace(/\s/g, "").length;
        }

        /* ---------------------------------------------------- */
        /* [도구 3] D-Day 로직 */
        /* ---------------------------------------------------- */
        function calculateDDay() {
            const targetInput = document.getElementById('target-date').value;
            if (!targetInput) return;

            const today = new Date();
            today.setHours(0,0,0,0);
            
            const target = new Date(targetInput);
            target.setHours(0,0,0,0);

            const diffTime = target.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const resultBox = document.getElementById('dday-result');

            if (diffDays === 0) {
                resultBox.innerHTML = "🎉 <span style='color: #ea580c;'>반가운 오늘, D-Day 당일입니다!</span>";
            } else if (diffDays > 0) {
                resultBox.innerHTML = `설정하신 날까지 포근한 <span style='color: #2563eb;'>D-${diffDays}</span> 일 남았습니다.`;
            } else {
                resultBox.innerHTML = `그날로부터 벌써 <span style='color: #64748b;'>D+${Math.abs(diffDays)}</span> 일만큼 흘렀네요.`;
            }
        }

        /* ---------------------------------------------------- */
        /* [도구 4] 추첨기 로직 */
        /* ---------------------------------------------------- */
        function pickRandom() {
            const rawText = document.getElementById('picker-items').value.trim();
            const resultBox = document.getElementById('picker-result');
            
            if(!rawText) {
                resultBox.textContent = "⚠️ 추첨할 후보 리스트를 입력해 주세요.";
                return;
            }

            let items = rawText.split(/,|\n/).map(item => item.trim()).filter(item => item !== "");

            if(items.length < 2) {
                resultBox.textContent = "⚠️ 최소 2가지 이상의 고를 거리를 적어주세요.";
                return;
            }

            let count = 0;
            const interval = setInterval(() => {
                const randomTemp = items[Math.floor(Math.random() * items.length)];
                resultBox.textContent = `🎲 고르는 중... [ ${randomTemp} ]`;
                count++;
                
                if(count > 10) {
                    clearInterval(interval);
                    const finalChoice = items[Math.floor(Math.random() * items.length)];
                    resultBox.innerHTML = `🎯 오늘의 픽: <span style='color: #db2777; font-size: 1.6rem; font-weight:800;'>${finalChoice}</span>`;
                }
            }, 80);
        }
    </script>
</body>
</html>
