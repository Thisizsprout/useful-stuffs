<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Web Toolkit v2.0</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --danger-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; }
        
        /* 헤더 & 이스터에그 */
        header { text-align: center; padding: 10px 0; cursor: pointer; user-select: none; }
        header h1 { font-size: 2rem; color: var(--accent-color); transition: transform 0.3s; }
        header h1:active { transform: scale(0.95); }

        /* 탭 내비게이션 */
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        @media (max-width: 600px) { .tabs { grid-template-columns: repeat(2, 1fr); } }
        .tab-btn { background-color: var(--panel-bg); color: var(--text-muted); border: 1px solid var(--border-color); padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); }

        /* 메인 콘텐츠 패널 */
        .panel { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; display: none; min-height: 300px; }
        .panel.active { display: block; }

        /* 공통 요소 */
        input, select, textarea { width: 100%; background-color: var(--bg-color); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 1rem; }
        button.btn { background-color: var(--accent-color); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button.btn:hover { background-color: var(--accent-hover); }

        /* 1. 계산기 스타일 (키보드 지원 안내 추가) */
        .calc-screen { background-color: var(--bg-color); text-align: right; padding: 15px; font-size: 1.8rem; border-radius: 8px; margin-bottom: 15px; min-height: 65px; word-break: break-all; border: 1px solid var(--border-color); }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-grid button { background-color: #2d3748; border: none; color: white; padding: 15px; font-size: 1.2rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .calc-grid button:hover { background-color: #4a5568; }
        .calc-grid button.op { background-color: var(--accent-color); }
        .calc-grid button.op:hover { background-color: var(--accent-hover); }
        .calc-grid button.danger { background-color: var(--danger-color); }
        .keyboard-info { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 10px; }

        /* 2~8번 기능 간편 스타일들 */
        .flex-group { display: flex; gap: 10px; }
        .list-container { list-style: none; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; background: var(--bg-color); padding: 10px; border-radius: 6px; margin-bottom: 5px; border: 1px solid var(--border-color); }
        
        /* 무작위 인터넷 정보 섹션 (요청사항 1) */
        .internet-info-box { background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px dashed var(--accent-color); border-radius: 12px; padding: 20px; margin-top: 10px; text-align: center; }
        .info-title { font-size: 0.9rem; color: var(--accent-color); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .info-content { font-size: 1rem; line-height: 1.6; color: var(--text-color); margin-bottom: 12px; min-height: 48px; }
        .refresh-info-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .refresh-info-btn:hover { border-color: var(--accent-color); color: var(--text-color); }
    </style>
</head>
<body>

<div class="container">
    <header onclick="triggerEasterEgg()">
        <h1 id="logo">🛠️ Multi-Web Toolkit</h1>
    </header>

    <!-- 8가지 기능 탭 네비게이션 -->
    <nav class="tabs">
        <button class="tab-btn active" onclick="openTab(0)">계산기</button>
        <button class="tab-btn" onclick="openTab(1)">단위변환</button>
        <button class="tab-btn" onclick="openTab(2)">스톱워치</button>
        <button class="tab-btn" onclick="openTab(3)">글자수세기</button>
        <button class="tab-btn" onclick="openTab(4)">할일목록</button>
        <button class="tab-btn" onclick="openTab(5)">암호생성</button>
        <button class="tab-btn" onclick="openTab(6)">포모도로</button>
        <button class="tab-btn" onclick="openTab(7)">디데이</button>
    </nav>

    <!-- 1. 계산기 패널 -->
    <div class="panel active">
        <h3>스마트 계산기</h3>
        <p class="keyboard-info">💡 컴퓨터 자판(숫자 패드, Enter, 사칙연산 키, Backspace, Esc) 입력이 지원됩니다.</p>
        <div class="calc-screen" id="calcDisplay">0</div>
        <div class="calc-grid">
            <button class="danger" onclick="clearCalc()">C</button>
            <button onclick="pressCalc('(')">(</button>
            <button onclick="pressCalc(')')">)</button>
            <button class="op" onclick="pressCalc('/')">/</button>
            <button onclick="pressCalc('7')">7</button>
            <button onclick="pressCalc('8')">8</button>
            <button onclick="pressCalc('9')">9</button>
            <button class="op" onclick="pressCalc('*')">*</button>
            <button onclick="pressCalc('4')">4</button>
            <button onclick="pressCalc('5')">5</button>
            <button onclick="pressCalc('6')">6</button>
            <button class="op" onclick="pressCalc('-')">-</button>
            <button onclick="pressCalc('1')">1</button>
            <button onclick="pressCalc('2')">2</button>
            <button onclick="pressCalc('3')">3</button>
            <button class="op" onclick="pressCalc('+')">+</button>
            <button onclick="pressCalc('0')">0</button>
            <button onclick="pressCalc('.')">.</button>
            <button onclick="backspaceCalc()">←</button>
            <button class="op" onclick="runCalc()">=</button>
        </div>
    </div>

    <!-- 2. 단위 변환기 패널 -->
    <div class="panel">
        <h3>길이 단위 변환기</h3>
        <input type="number" id="unitInput" placeholder="값을 입력하세요" oninput="convertUnit()">
        <div class="flex-group">
            <select id="fromUnit" onchange="convertUnit()">
                <option value="cm">센티미터(cm)</option>
                <option value="m">미터(m)</option>
                <option value="inch">인치(inch)</option>
            </select>
            <span style="align-self: center;">➔</span>
            <select id="toUnit" onchange="convertUnit()">
                <option value="cm">센티미터(cm)</option>
                <option value="m" selected>미터(m)</option>
                <option value="inch">인치(inch)</option>
            </select>
        </div>
        <div id="unitResult" style="font-size: 1.2rem; font-weight: bold; text-align: center; margin-top: 15px;">결과: -</div>
    </div>

    <!-- 3. 스톱워치 패널 -->
    <div class="panel">
        <h3>스톱워치</h3>
        <div id="stopwatchDisplay" style="font-size: 2.5rem; text-align: center; margin: 20px 0;">00:00:00.00</div>
        <div class="flex-group">
            <button class="btn" onclick="startStopwatch()">시작</button>
            <button class="btn" style="background-color: #4b5563;" onclick="stopStopwatch()">정지</button>
            <button class="btn danger" onclick="resetStopwatch()">리셋</button>
        </div>
    </div>

    <!-- 4. 글자수 세기 패널 -->
    <div class="panel">
        <h3>실시간 글자수 세기</h3>
        <textarea id="textInput" rows="6" placeholder="여기에 텍스트를 입력하거나 붙여넣으세요..." oninput="countText()"></textarea>
        <p id="charCount">공백 포함: 0자 | 공백 제외: 0자</p>
    </div>

    <!-- 5. 할 일 목록 패널 -->
    <div class="panel">
        <h3>오늘의 할 일</h3>
        <div class="flex-group">
            <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." onkeypress="if(event.key==='Enter') addTodo()">
            <button class="btn" style="width: auto; white-space: nowrap;" onclick="addTodo()">추가</button>
        </div>
        <ul class="list-container" id="todoList"></ul>
    </div>

    <!-- 6. 비밀번호 생성기 패널 -->
    <div class="panel">
        <h3>안전한 암호 생성기</h3>
        <div class="flex-group" style="align-items: center; margin-bottom: 15px;">
            <label>길이: </label>
            <input type="number" id="pwLength" value="12" min="6" max="30" style="margin-bottom: 0; width: 80px;">
        </div>
        <button class="btn" onclick="generatePassword()">비밀번호 생성</button>
        <input type="text" id="pwResult" readonly style="margin-top: 15px; text-align: center; font-family: monospace; letter-spacing: 1px;">
    </div>

    <!-- 7. 포모도로 타이머 패널 -->
    <div class="panel">
        <h3>포모도로 집중 타이머 (25분)</h3>
        <div id="pomodoroDisplay" style="font-size: 2.5rem; text-align: center; margin: 20px 0;">25:00</div>
        <div class="flex-group">
            <button class="btn" onclick="startPomodoro()">집중 시작</button>
            <button class="btn danger" onclick="resetPomodoro()">초기화</button>
        </div>
    </div>

    <!-- 8. 디데이 계산기 패널 -->
    <div class="panel">
        <h3>디데이 계산기</h3>
        <input type="date" id="targetDate" onchange="calcDDay()">
        <div id="ddayResult" style="font-size: 1.5rem; font-weight: bold; text-align: center; margin-top: 20px;">날짜를 선택해 주세요.</div>
    </div>

    <!-- [업데이트 요구사항 1] 인터넷 무작위 정보 요약 박스 -->
    <div class="internet-info-box">
        <div class="info-title">🌐 쓸데없지만 재밌는 지식 보기</div>
        <div class="info-content" id="infoContent">지식을 불러오는 중...</div>
        <button class="refresh-info-btn" onclick="displayRandomInfo()">🔄 다른 지식 보기</button>
    </div>
</div>

<script>
    /* ================= 탭 전환 로직 ================= */
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.panel');
    function openTab(index) {
        tabs.forEach(tab => tab.classList.remove('active'));
        panels.forEach(panel => panel.classList.remove('active'));
        tabs[index].classList.add('active');
        panels[index].classList.add('active');
    }

    /* ================= [요구사항 2] 계산기 기능 + 키보드 자판 제어 ================= */
    const calcDisplay = document.getElementById('calcDisplay');
    let calcReset = false;

    function pressCalc(value) {
        if (calcDisplay.innerText === '0' || calcReset) {
            if (value === '.' || isNaN(value) && value !== '(' && value !== ')') {
                calcDisplay.innerText += value;
            } else {
                calcDisplay.innerText = value;
            }
            calcReset = false;
        } else {
            calcDisplay.innerText += value;
        }
    }

    function clearCalc() { calcDisplay.innerText = '0'; }
    function backspaceCalc() {
        if (calcDisplay.innerText.length > 1) {
            calcDisplay.innerText = calcDisplay.innerText.slice(0, -1);
        } else {
            calcDisplay.innerText = '0';
        }
    }
    function runCalc() {
        try {
            let expression = calcDisplay.innerText;
            // 예외 방지를 위한 기초적인 정제 연산
            let result = new Function('return ' + expression)();
            calcDisplay.innerText = Number(result.toFixed(8)); // 소수점 유연 처리
            calcReset = true;
        } catch (e) {
            calcDisplay.innerText = 'Error';
            calcReset = true;
        }
    }

    // 전역 키보드 이벤트 리스너 추가
    window.addEventListener('keydown', function(e) {
        // 사용자가 다른 텍스트 입력창(할일 목록, 글자수 입력 등)을 사용 중일 때는 계산기 키보드 이벤트를 무시함
        if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
            return;
        }

        const key = e.key;
        
        // 숫자 및 소수점
        if (/[0-9.]/.test(key)) {
            e.preventDefault();
            pressCalc(key);
        }
        // 사칙연산 기호 및 괄호
        else if (/[\+\-\*\/()]/.test(key)) {
            e.preventDefault();
            pressCalc(key);
        }
        // 계산 실행 (Enter 또는 =)
        else if (key === 'Enter' || key === '=') {
            e.preventDefault();
            runCalc();
        }
        // 한 글자 지우기 (Backspace)
        else if (key === 'Backspace') {
            e.preventDefault();
            backspaceCalc();
        }
        // 전체 초기화 (Escape)
        else if (key === 'Escape') {
            e.preventDefault();
            clearCalc();
        }
    });


    /* ================= [요구사항 1] 인터넷 무작위 정보 요약 데이터 및 로직 ================= */
    const internetInfos = [
        "웹브라우저 Firefox의 로고에 그려진 동물은 사실 레서판다(Red Panda)입니다. 레서판다의 영문 별칭 중 하나가 바로 'Firefox'이기 때문입니다.",
        "인터넷의 최초 전송 메시지는 1969년 'LOGIN'을 치려다 시스템이 다운되며 전송된 'LO'였습니다. 뜻하지 않게 '보라(Lo)'라는 감탄사가 첫 문자가 되었습니다.",
        "캡차(CAPTCHA) 검사에서 '로봇이 아닙니다' 체크박스를 누를 때, 시스템은 클릭 순간뿐만 아니라 마우스가 움직인 궤적과 브라우저의 마이크로 단위 행동 패턴을 분석해 인간을 판별합니다.",
        "전 세계 바다 밑에는 수백 개의 초고속 광케이블이 깔려 전 세계 인터넷 트래픽의 99%를 전송합니다. 위성 통신은 전체 데이터 전송량 중 극히 일부만 담당합니다.",
        "우주선 Voyager 1호에 탑재된 컴퓨터의 메모리는 단 69KB입니다. 현재 우리가 사용하는 스마트폰 이미지 한 장 크기의 수만 분의 일에 불과하지만 여전히 우주를 비행하며 데이터를 보냅니다.",
        "URL 주소에 붙는 '//' 기호를 고안한 팀 버너스 리는 훗날 인터뷰에서 '그 기호는 사실 없어도 되는 것이었으며, 타이핑 수고만 덜어주었어도 좋았을 것'이라며 후회 섞인 농담을 던졌습니다.",
        "이메일 주소의 '@' 골뱅이 기호는 1971년 레이 톰린슨이 최초로 도입했습니다. 당시 컴퓨터 환경에서 사람 이름과 호스트 컴퓨터 이름을 분리하기 위해 거의 쓰이지 않던 이 기호를 골라 쓴 것이 시초입니다.",
        "꿀벌은 사람의 얼굴을 인식하고 기억할 수 있는 뇌 신경망을 가지고 있습니다. 꿀벌에게 특정 얼굴 사진을 보여주고 설탕물을 주는 방식으로 훈련하면 몇 번이고 그 얼굴을 찾아냅니다.",
        "바나나는 식물학적으로 '나무'가 아니라 거대한 '풀'에서 자라는 열매입니다. 또한 진화 구조상 씨가 없는 씨없는 수박처럼 유전적 복제를 통해 재배되므로 질병에 극히 취약합니다.",
        "초기 컴퓨터 바이러스 중 일부는 시스템 파괴 목적이 아니라 화면에 평화의 메시지를 띄우거나 걸어 다니는 구피 캐릭터를 보여주는 등 일종의 장난이나 기술 과시용 아트로 제작되었습니다.",
        "GIF 애니메이션의 개발자인 스티브 윌하이트는 이 단어를 '기프'가 아닌 '지프(Jif)'로 발음하는 것이 맞다고 공식 석상에서 직접 명시한 바 있습니다.",
        "양자컴퓨터는 모든 연산을 빠르게 만드는 요술봉이 아닙니다. 암호 해독, 분자 시뮬레이션 등 특정 알고리즘 영역에서만 기하급수적인 속도를 내며, 단순 유튜브 스트리밍 등에는 무용지물입니다."
    ];

    function displayRandomInfo() {
        const infoContent = document.getElementById('infoContent');
        const randomIndex = Math.floor(Math.random() * internetInfos.length);
        infoContent.innerText = internetInfos[randomIndex];
    }


    /* ================= 2~8번 기능별 보조 스크립트 ================= */
    // 2. 단위 변환기
    function convertUnit() {
        const val = parseFloat(document.getElementById('unitInput').value);
        if (isNaN(val)) return;
        const from = document.getElementById('fromUnit').value;
        const to = document.getElementById('toUnit').value;
        
        let cmVal = 0;
        if(from === 'cm') cmVal = val;
        else if(from === 'm') cmVal = val * 100;
        else if(from === 'inch') cmVal = val * 2.54;

        let result = 0;
        if(to === 'cm') result = cmVal;
        else if(to === 'm') result = cmVal / 100;
        else if(to === 'inch') result = cmVal / 2.54;

        document.getElementById('unitResult').innerText = `결과: ${result.toFixed(2)} ${to}`;
    }

    // 3. 스톱워치
    let swInterval, swStart;
    function startStopwatch() {
        clearInterval(swInterval);
        swStart = Date.now() - (swStart ? swStart : 0);
        swInterval = setInterval(() => {
            const diff = Date.now() - swStart;
            const ms = Math.floor((diff % 1000) / 10).toString().padStart(2, '0');
            const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            const m = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
            document.getElementById('stopwatchDisplay').innerText = `${m}:${s}.${ms}`;
        }, 10);
    }
    function stopStopwatch() { clearInterval(swInterval); swStart = Date.now() - swStart; }
    function resetStopwatch() { clearInterval(swInterval); swStart = null; document.getElementById('stopwatchDisplay').innerText = "00:00.00"; }

    // 4. 글자수 세기
    function countText() {
        const txt = document.getElementById('textInput').value;
        const includeSpace = txt.length;
        const excludeSpace = txt.replace(/\s/g, "").length;
        document.getElementById('charCount').innerText = `공백 포함: ${includeSpace}자 | 공백 제외: ${excludeSpace}자`;
    }

    // 5. 할 일 목록
    function addTodo() {
        const input = document.getElementById('todoInput');
        if (!input.value.trim()) return;
        const li = document.createElement('li');
        li.className = 'list-item';
        li.innerHTML = `<span>${input.value}</span><button onclick="this.parentElement.remove()" style="background:none; border:none; color:var(--danger-color); cursor:pointer;">X</button>`;
        document.getElementById('todoList').appendChild(li);
        input.value = '';
    }

    // 6. 비밀번호 생성기
    function generatePassword() {
        const len = parseInt(document.getElementById('pwLength').value) || 12;
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
        let pw = "";
        for(let i=0; i<len; i++) pw += chars.charAt(Math.floor(Math.random() * chars.length));
        document.getElementById('pwResult').value = pw;
    }

    // 7. 포모도로
    let pomoInterval, pomoTime = 1500;
    function startPomodoro() {
        clearInterval(pomoInterval);
        pomoInterval = setInterval(() => {
            if(pomoTime <= 0) {
                clearInterval(pomoInterval);
                alert("집중 시간 끝! 잠시 휴식을 취하세요.");
                return;
            }
            pomoTime--;
            const m = Math.floor(pomoTime / 60).toString().padStart(2, '0');
            const s = (pomoTime % 60).toString().padStart(2, '0');
            document.getElementById('pomodoroDisplay').innerText = `${m}:${s}`;
        }, 10); // 테스트 및 구동 편의성을 위해 약간 빠르게 흐르도록 설정 가능 (초당 10ms 호출은 배터리 소모가 크니 실사용 시 1000ms 추천)
    }
    function resetPomodoro() { clearInterval(pomoInterval); pomoTime = 1500; document.getElementById('pomodoroDisplay').innerText = "25:00"; }

    // 8. 디데이 계산기
    function calcDDay() {
        const dateVal = document.getElementById('targetDate').value;
        if(!dateVal) return;
        const target = new Date(dateVal);
        const today = new Date();
        today.setHours(0,0,0,0);
        target.setHours(0,0,0,0);
        const diff = target.getTime() - today.getTime();
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        const resBox = document.getElementById('ddayResult');
        if(days === 0) resBox.innerText = "D-Day! 바로 오늘입니다.";
        else if(days > 0) resBox.innerText = `D-${days} 남았습니다.`;
        else resBox.innerText = `D+${Math.abs(days)} 지났습니다.`;
    }

    /* ================= 이스터에그 ================= */
    let clickCount = 0;
    function triggerEasterEgg() {
        clickCount++;
        if(clickCount >= 5) {
            document.getElementById('logo').style.color = '#10b981';
            document.getElementById('logo').innerText = "🚀 Developer Mode Activated!";
            console.log("🎉 시스템 이스터에그 발견! 툴킷의 잠재력이 해제되었습니다.");
            clickCount = 0;
        }
    }

    // 페이지가 초기화될 때 무작위 지식을 먼저 보여줌
    window.onload = function() {
        displayRandomInfo();
    }
</script>
