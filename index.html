<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid Glassmorphism Multi-Utility Hub</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #15103c 35%, #2b0c3a 70%, #02040a 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-highlight: rgba(255, 255, 255, 0.18);
            
            /* 테마 핵심 비비드 네온 컬러 파츠 */
            --vivid-neon: #ccff00;    /* 네온 라임 포이즌 */
            --vivid-cyan: #00f0ff;    /* 일렉트릭 시안 플레어 */
            --vivid-magenta: #ff007f; /* 하이퍼 마젠타 핑크 */
            
            --text-white: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.65);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-white);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 공간감을 극대화하는 백그라운드 발광 네온 오라 구조 */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.35;
            pointer-events: none;
        }
        body::before {
            top: 5%;
            left: 10%;
            background: var(--vivid-cyan);
        }
        body::after {
            bottom: 10%;
            right: 10%;
            background: var(--vivid-magenta);
        }

        /* 마스터 헤더 유닛 */
        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding: 24px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--vivid-neon), var(--vivid-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(204, 255, 0, 0.25);
        }

        .lang-selector {
            background: rgba(0, 0, 0, 0.5);
            color: var(--text-white);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            border-radius: 14px;
            outline: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .lang-selector:focus {
            border-color: var(--vivid-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* 스크롤 제어가 탑재된 글래스모피즘 내비게이션 바 */
        nav {
            display: flex;
            gap: 12px;
            max-width: 900px;
            width: 100%;
            overflow-x: auto;
            padding-bottom: 14px;
            margin-bottom: 30px;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }

        nav button {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 14px 24px;
            border-radius: 40px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 700;
            font-size: 0.95rem;
        }
        nav button:hover {
            background: rgba(255, 255, 255, 0.14);
            color: var(--text-white);
            border-color: var(--glass-highlight);
            transform: translateY(-2px);
        }
        nav button.active {
            background: rgba(255, 255, 255, 0.2);
            color: var(--vivid-neon);
            border-color: var(--vivid-neon);
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.35), inset 0 0 10px rgba(204, 255, 0, 0.15);
            transform: translateY(-2px);
        }

        /* 메인 컨테이너 랙 및 모포시스 인터페이스 가속 애니메이션 */
        main {
            width: 100%;
            max-width: 900px;
        }

        .tab-content {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 var(--glass-highlight);
            display: none;
            opacity: 0;
            transform: translateY(25px) scale(0.97);
            transition: opacity 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        h2 {
            margin-bottom: 28px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            border-left: 5px solid var(--vivid-cyan);
            padding-left: 14px;
        }

        /* 고해상도 글래스모피즘 전용 제어소 소스 구성원 */
        input, select.tool-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-white);
            font-size: 1.05rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        input:focus, select.tool-input:focus {
            border-color: var(--vivid-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.35);
            background: rgba(0, 0, 0, 0.6);
        }

        /* [버그 수정 완료] 뒷부분 디자인을 파괴하며 무한대로 늘어나는 textarea 크기 제어 */
        textarea {
            width: 100%;
            min-width: 100%;
            max-width: 100%; /* 가로폭이 컨테이너를 찢고 나가는 현상 방지 */
            min-height: 120px;
            max-height: 400px; /* 세로폭이 뒷부분 배경과 전체 디자인을 짓누르는 현상 방지 */
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-white);
            font-size: 1.05rem;
            font-weight: 500;
            outline: none;
            resize: vertical; /* 좌우 변형을 원천 차단하고 상하 조절만 안전하게 허용 */
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }
        textarea:focus {
            border-color: var(--vivid-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.35);
            background: rgba(0, 0, 0, 0.6);
        }

        ::placeholder { color: rgba(255, 255, 255, 0.3); }

        button.btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--vivid-cyan), #00bcff);
            color: #070b12;
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.35);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        button.btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.55);
            filter: brightness(1.15);
        }
        button.btn:active { transform: translateY(-1px); }

        /* 결과창 유닛 박스 */
        .result-box {
            margin-top: 25px;
            padding: 22px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            font-weight: 700;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--vivid-neon);
            text-shadow: 0 0 10px rgba(204, 255, 0, 0.25);
            font-size: 1.1rem;
        }

        /* 1. 계산기 그리드 아키텍처 */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .calc-grid button {
            padding: 24px;
            font-size: 1.4rem;
            font-weight: 700;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-white);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .calc-grid button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--glass-highlight);
            transform: scale(1.04);
        }
        .calc-grid button.operator {
            color: var(--vivid-cyan);
            background: rgba(0, 240, 255, 0.04);
        }
        .calc-grid button.operator:hover {
            background: rgba(0, 240, 255, 0.15);
        }
        .calc-grid button.equal {
            background: linear-gradient(135deg, var(--vivid-neon), #bce600);
            color: #05080f;
            grid-column: span 2;
            font-weight: 800;
            box-shadow: 0 5px 20px rgba(204, 255, 0, 0.35);
        }
        .calc-grid button.equal:hover { filter: brightness(1.15); }

        .flex-group {
            display: flex;
            gap: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="txt-title">멀티 유틸리티 허브</h1>
        <select id="lang-select" class="lang-selector" onchange="changeLanguage(this.value)">
            <option value="ko">KO</option>
            <option value="en">EN</option>
        </select>
    </header>

    <nav id="nav-tabs"></nav>

    <main>
        <!-- 1. 계산기 인프라 -->
        <div id="calc" class="tab-content">
            <h2 id="title-calc">🧮 계산기</h2>
            <input type="text" id="calc-display" readonly style="text-align: right; font-size: 2rem; font-family: monospace; letter-spacing: 1px; padding: 22px; margin-bottom: 25px; color: var(--vivid-cyan);">
            <div class="calc-grid">
                <button onclick="clearCalc()" style="color: var(--vivid-magenta);">C</button>
                <button onclick="inputCalc('/')" class="operator">/</button>
                <button onclick="inputCalc('*')" class="operator">*</button>
                <button onclick="inputCalc('-')" class="operator">-</button>
                <button onclick="inputCalc('7')">7</button>
                <button onclick="inputCalc('8')">8</button>
                <button onclick="inputCalc('9')">9</button>
                <button onclick="inputCalc('+')" class="operator">+</button>
                <button onclick="inputCalc('4')">4</button>
                <button onclick="inputCalc('5')">5</button>
                <button onclick="inputCalc('6')">6</button>
                <button onclick="inputCalc('.')">.</button>
                <button onclick="inputCalc('1')">1</button>
                <button onclick="inputCalc('2')">2</button>
                <button onclick="inputCalc('3')">3</button>
                <button onclick="inputCalc('0')">0</button>
                <button onclick="pressEqual()" class="equal">=</button>
            </div>
        </div>

        <!-- 2. 글자수 세기 인프라 (안전 억제 완료) -->
        <div id="counter" class="tab-content">
            <h2 id="title-counter">📝 글자수 세기</h2>
            <textarea id="counter-input" placeholder="텍스트를 입력하세요..." oninput="countText()" style="margin-bottom: 5px;"></textarea>
            <div class="result-box" id="counter-result">공백 포함: 0자 | 공백 제외: 0자</div>
        </div>

        <!-- 3. 디데이 계측소 -->
        <div id="dday" class="tab-content">
            <h2 id="title-dday">📅 디데이 계산기</h2>
            <input type="date" id="dday-date" onchange="calculateDDay()" style="color-scheme: dark; font-weight: 700;">
            <div class="result-box" id="dday-result">날짜를 선택해 주세요.</div>
        </div>

        <!-- 4. 랜덤 분배기 (안전 억제 완료) -->
        <div id="random" class="tab-content">
            <h2 id="title-random">🎲 랜덤 추첨</h2>
            <textarea id="random-input" placeholder="항목들을 콤마(,)나 줄바꿈으로 구분해서 입력하세요..." style="margin-bottom: 25px;"></textarea>
            <button class="btn" id="btn-draw" onclick="drawRandom()">추첨하기</button>
            <div class="result-box" id="random-result" style="color: var(--vivid-magenta); text-shadow: 0 0 12px rgba(255,0,127,0.3);">결과가 여기에 표시됩니다.</div>
        </div>

        <!-- 5. 생체 매트릭스 (BMI) -->
        <div id="bmi" class="tab-content">
            <h2 id="title-bmi">⚖️ BMI 계산기</h2>
            <div class="flex-group" style="margin-bottom: 25px;">
                <input type="number" id="bmi-height" placeholder="키 (cm)">
                <input type="number" id="bmi-weight" placeholder="몸무게 (kg)">
            </div>
            <button class="btn" id="btn-bmi" onclick="calcBMI()">계산하기</button>
            <div class="result-box" id="bmi-result">신체 스펙을 입력해 주세요.</div>
        </div>

        <!-- 6. 보안 암호 발전소 -->
        <div id="password" class="tab-content">
            <h2 id="title-pwd">🔒 암호 생성기</h2>
            <input type="number" id="pwd-length" value="12" min="4" max="30" placeholder="암호 길이 (4~30)" style="margin-bottom: 25px;">
            <button class="btn" id="btn-pwd" onclick="generatePassword()">비밀번호 생성</button>
            <div class="result-box" id="pwd-result" style="font-family: monospace; font-size: 1.35rem; letter-spacing: 2px; color: var(--vivid-cyan); text-shadow: 0 0 10px rgba(0,240,255,0.25);">보안 암호가 여기에 표시됩니다.</div>
        </div>

        <!-- 7. 정밀 스톱워치 코어 -->
        <div id="stopwatch" class="tab-content">
            <h2 id="title-stopwatch">⏱️ 스톱워치</h2>
            <div class="result-box" id="sw-time" style="font-size: 2.5rem; font-family: monospace; color: var(--text-white); padding: 35px; background: rgba(0,0,0,0.55); border-radius: 20px; margin-bottom: 25px; letter-spacing: 1px;">00:00:00.00</div>
            <div class="flex-group">
                <button class="btn" id="btn-sw-start" onclick="startSW()">시작</button>
                <button class="btn" id="btn-sw-stop" onclick="stopSW()">정지</button>
                <button class="btn" id="btn-sw-reset" onclick="resetSW()">리셋</button>
            </div>
        </div>

        <!-- 8. 메트릭 선형 변환기 -->
        <div id="converter" class="tab-content">
            <h2 id="title-converter">🔄 단위 변환기 (길이)</h2>
            <div class="flex-group" style="margin-bottom: 25px;">
                <input type="number" id="convert-input" value="1" oninput="convertUnit()">
                <select id="convert-from" class="tool-input" style="width: 150px;" onchange="convertUnit()">
                    <option value="cm">cm</option>
                    <option value="m">m</option>
                    <option value="km">km</option>
                    <option value="inch">inch</option>
                </select>
            </div>
            <div class="result-box" id="converter-result" style="line-height: 1.7; text-align: left; padding: 25px; justify-content: flex-start; font-family: monospace;">결과가 여기에 표시됩니다.</div>
        </div>
    </main>

    <script>
        // 무결성 패치 완료된 글로벌 다국어 정보 오브젝트
        const langData = {
            ko: {
                title: "멀티 유틸리티 허브",
                calc: "🧮 계산기",
                counter: "📝 글자수 세기",
                dday: "📅 디데이 계산기",
                random: "🎲 랜덤 추첨",
                bmi: "⚖️ BMI 계산기",
                password: "🔒 암호 생성기",
                stopwatch: "⏱️ 스톱워치",
                converter: "🔄 단위 변환기",
                counterPlh: "텍스트를 입력하거나 이곳에 복사하여 붙여넣으세요...",
                counterRes: "공백 포함: {inc}자 | 공백 제외: {exc}자",
                ddayPlh: "기준이 될 목표 날짜를 선택해 주세요.",
                ddayToday: "대망의 바로 오늘입니다! 🎉",
                randomPlh: "추첨할 항목들을 콤마(,)나 줄바꿈으로 명확히 구분하여 입력하세요...",
                randomBtn: "추첨하기",
                randomRes: "추첨 결과가 이 자리에 명시됩니다.",
                bmiBtn: "지수 계산하기",
                bmiRes: "정확한 측정을 위해 키와 몸무게를 채워주세요.",
                pwdBtn: "강력한 암호 생성",
                pwdRes: "생성된 보안 난수 암호가 여기에 표시됩니다.",
                swStart: "시작", swStop: "정지", swReset: "리셋",
                convRes: "변환 결과가 이 자리에 출력됩니다."
            },
            en: {
                title: "Multi-Utility Hub",
                calc: "🧮 Calculator",
                counter: "📝 Word Counter",
                dday: "📅 D-Day Tracker",
                random: "🎲 Random Picker",
                bmi: "⚖️ BMI Calculator",
                password: "🔒 Pwd Generator",
                stopwatch: "⏱️ Stopwatch",
                converter: "🔄 Unit Converter",
                counterPlh: "Type, edit or paste your source text here...",
                counterRes: "Character Count (with spaces): {inc} | (without spaces): {exc}",
                ddayPlh: "Please choose your target d-day destination date.",
                ddayToday: "Today is the dynamic day! 🎉",
                randomPlh: "Input multiple pool targets separated by commas or lines...",
                randomBtn: "Pick at Random",
                randomRes: "The random selection outcome will be placed here.",
                bmiBtn: "Run Analytics",
                bmiRes: "Please check and enter your vertical height and absolute weight metrics.",
                pwdBtn: "Generate Token",
                pwdRes: "Your advanced secure cryptographic key will be provisioned here.",
                swStart: "Start", swStop: "Stop", swReset: "Reset",
                convRes: "Metric translation breakdown will appear here."
            }
        };

        let currentLang = 'ko';
        const tabs = ['calc', 'counter', 'dday', 'random', 'bmi', 'password', 'stopwatch', 'converter'];

        function initTabs() {
            const nav = document.getElementById('nav-tabs');
            nav.innerHTML = '';
            tabs.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.id = `nav-btn-${tab}`;
                btn.textContent = langData[currentLang][tab];
                btn.className = index === 0 ? 'active' : '';
                btn.onclick = () => switchTab(tab);
                nav.appendChild(btn);
            });
            switchTab(tabs[0]);
        }

        function switchTab(tabId) {
            tabs.forEach(id => {
                const content = document.getElementById(id);
                const btn = document.getElementById(`nav-btn-${id}`);
                if (id === tabId) {
                    content.style.display = 'block';
                    setTimeout(() => content.classList.add('active'), 25);
                    if(btn) btn.classList.add('active');
                } else {
                    content.classList.remove('active');
                    content.style.display = 'none';
                    if(btn) btn.classList.remove('active');
                }
            });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('txt-title').textContent = langData[lang].title;
            
            tabs.forEach(tab => {
                document.getElementById(`title-${tab === 'password' ? 'pwd' : tab}`).textContent = langData[lang][tab];
                const navBtn = document.getElementById(`nav-btn-${tab}`);
                if (navBtn) navBtn.textContent = langData[lang][tab];
            });

            document.getElementById('counter-input').placeholder = langData[lang].counterPlh;
            document.getElementById('random-input').placeholder = langData[lang].randomPlh;
            document.getElementById('btn-draw').textContent = langData[lang].randomBtn;
            document.getElementById('btn-bmi').textContent = langData[lang].bmiBtn;
            document.getElementById('btn-pwd').textContent = langData[lang].pwdBtn;
            document.getElementById('btn-sw-start').textContent = langData[lang].swStart;
            document.getElementById('btn-sw-stop').textContent = langData[lang].swStop;
            document.getElementById('btn-sw-reset').textContent = langData[lang].swReset;

            countText();
            calculateDDay();
            convertUnit();
        }

        // 1. 계산기 로직
        let calcDisplay = document.getElementById('calc-display');
        function inputCalc(val) { calcDisplay.value += val; }
        function clearCalc() { calcDisplay.value = ''; }
        function pressEqual() {
            try {
                if(calcDisplay.value) {
                    calcDisplay.value = Function(`"use strict"; return (${calcDisplay.value})`)();
                }
            } catch(e) {
                calcDisplay.value = 'Error';
            }
        }

        // 2. 글자수 세기 로직
        function countText() {
            const text = document.getElementById('counter-input').value;
            const incSpaces = text.length;
            const excSpaces = text.replace(/\s/g, '').length;
            
            if (incSpaces === 0 && excSpaces === 0) {
                document.getElementById('counter-result').textContent = langData[currentLang].counterRes.replace('{inc}', 0).replace('{exc}', 0);
                return;
            }
            let template = langData[currentLang].counterRes;
            document.getElementById('counter-result').textContent = template.replace('{inc}', incSpaces).replace('{exc}', excSpaces);
        }

        // 3. 디데이 로직
        function calculateDDay() {
            const dateVal = document.getElementById('dday-date').value;
            const resBox = document.getElementById('dday-result');
            if(!dateVal) {
                resBox.textContent = langData[currentLang].ddayPlh;
                return;
            }
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(dateVal);
            target.setHours(0,0,0,0);
            
            const diffTime = target - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if(diffDays === 0) resBox.textContent = langData[currentLang].ddayToday;
            else if(diffDays > 0) resBox.textContent = `D-${diffDays}`;
            else resBox.textContent = `D+${Math.abs(diffDays)}`;
        }

        // 4. 랜덤 추첨 로직
        function drawRandom() {
            const input = document.getElementById('random-input').value;
            const resBox = document.getElementById('random-result');
            if(!input.trim()) {
                resBox.textContent = langData[currentLang].randomRes;
                return;
            }
            const items = input.split(/,|\n/).map(item => item.trim()).filter(item => item);
            const picked = items[Math.floor(Math.random() * items.length)];
            resBox.textContent = `🎯 ${picked}`;
        }

        // 5. BMI 계산 로직
        function calcBMI() {
            const h = parseFloat(document.getElementById('bmi-height').value) / 100;
            const w = parseFloat(document.getElementById('bmi-weight').value);
            const resBox = document.getElementById('bmi-result');
            
            if(!h || !w) {
                resBox.textContent = langData[currentLang].bmiRes;
                return;
            }
            const bmi = (w / (h * h)).toFixed(1);
            let status = '';
            if(currentLang === 'ko') {
                if(bmi < 18.5) status = '저체중';
                else if(bmi < 23) status = '정상체중';
                else if(bmi < 25) status = '과체중';
                else status = '비만 상태';
            } else {
                if(bmi < 18.5) status = 'Underweight';
                else if(bmi < 25) status = 'Normal Spec';
                else if(bmi < 30) status = 'Overweight';
                else status = 'Obese Cluster';
            }
            resBox.textContent = `BMI: ${bmi} (${status})`;
        }

        // 6. 암호 생성 로직
        function generatePassword() {
            const len = parseInt(document.getElementById('pwd-length').value) || 12;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let pwd = "";
            for (let i = 0; i < len; i++) {
                pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('pwd-result').textContent = pwd;
        }

        // 7. 스톱워치 로직
        let swInterval;
        let swStartTime;
        let swElapsedTime = 0;
        function startSW() {
            if(!swInterval) {
                swStartTime = Date.now() - swElapsedTime;
                swInterval = setInterval(updateSW, 10);
            }
        }
        function stopSW() {
            clearInterval(swInterval);
            swInterval = null;
        }
        function resetSW() {
            stopSW();
            swElapsedTime = 0;
            document.getElementById('sw-time').textContent = "00:00:00.00";
        }
        function updateSW() {
            swElapsedTime = Date.now() - swStartTime;
            let m = Math.floor(swElapsedTime / 60000);
            let s = Math.floor((swElapsedTime % 60000) / 1000);
            let ms = Math.floor((swElapsedTime % 1000) / 10);
            document.getElementById('sw-time').textContent = 
                `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
        }

        // 8. 단위 변환 로직
        function convertUnit() {
            const val = parseFloat(document.getElementById('convert-input').value) || 0;
            const from = document.getElementById('convert-from').value;
            const resBox = document.getElementById('converter-result');
            
            let cm = 0;
            if(from === 'cm') cm = val;
            else if(from === 'm') cm = val * 100;
            else if(from === 'km') cm = val * 100000;
            else if(from === 'inch') cm = val * 2.54;

            const m = (cm / 100).toFixed(4);
            const km = (cm / 100000).toFixed(6);
            const inch = (cm / 2.54).toFixed(2);

            if(currentLang === 'ko') {
                resBox.innerHTML = `• ${cm} 센티미터 (cm)<br>• ${m} 미터 (m)<br>• ${km} 킬로미터 (km)<br>• ${inch} 인치 (inch)`;
            } else {
                resBox.innerHTML = `• ${cm} cm<br>• ${m} m<br>• ${km} km<br>• ${inch} inch`;
            }
        }

        window.onload = () => {
            initTabs();
            changeLanguage('ko');
        };
    </script>
</body>
</html>
