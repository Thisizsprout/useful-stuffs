<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="app-title">다기능 미니 앱</title>
  <style>
    /* 기본 스타일 리셋 및 배경 설정 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
    body { background-color: #f5f7fb; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    
    /* 1. 화면 가장자리 예쁜 이펙트 (7초 뒤 결과용) */
    #edge-effect {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9999;
      box-shadow: inset 0 0 0px rgba(255, 215, 0, 0);
    }
    @keyframes celebration-glow {
      0% { box-shadow: inset 0 0 80px rgba(255, 215, 0, 0.9); }
      50% { box-shadow: inset 0 0 40px rgba(255, 105, 180, 0.7); }
      100% { box-shadow: inset 0 0 0px rgba(255, 215, 0, 0); }
    }
    .trigger-effect { animation: celebration-glow 2.5s ease-in-out; }

    /* 헤더 및 언어 선택 */
    header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 24px; color: #4a5568; }
    select { padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; background: white; cursor: pointer; }

    /* 메인 컨테이너 및 탭 메뉴 */
    .container { width: 100%; max-width: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
    .tabs { display: flex; background: #e2e8f0; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: #64748b; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: white; color: #3b82f6; }
    
    /* 컨텐츠 영역 */
    .content-section { display: none; padding: 25px; }
    .content-section.active { display: block; }
    
    /* 공통 요소 스타일 */
    h2 { font-size: 18px; margin-bottom: 15px; color: #1e293b; }
    input, textarea, select.form-control { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
    button.main-btn { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; }
    button.main-btn:hover { background: #2563eb; }
    .result-box { background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 15px; text-align: center; min-height: 50px; font-weight: bold; }

    /* 비밀번호 배치용 */
    .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
    .input-group input { margin-bottom: 0; }
    .copy-btn { padding: 0 15px; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }
    .copy-btn:hover { background: #059669; }

    /* 단위 변환기 배치 */
    .unit-flex { display: flex; gap: 10px; align-items: center; }
    .unit-flex select, .unit-flex input { margin-bottom: 0; }
  </style>
</head>
<body>

  <!-- 가장자리 불빛 이펙트 레이어 -->
  <div id="edge-effect"></div>

  <!-- 헤더 (상단 바) -->
  <header>
    <h1 id="main-title">미니 툴킷</h1>
    <!-- 4. 언어 선택 드롭다운 방식으로 변경 -->
    <select id="lang-select" onchange="changeLanguage(this.value)">
      <option value="ko">🇰🇷 한국어</option>
      <option value="en">🇺🇸 English</option>
      <option value="ja">🇯🇵 日本語</option>
    </select>
  </header>

  <!-- 메인 앱 컨테이너 -->
  <div class="container">
    <!-- 탭 메뉴 항목 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(0)" id="tab0">랜덤 추천</button>
      <button class="tab-btn" onclick="switchTab(1)" id="tab1">비밀번호</button>
      <button class="tab-btn" onclick="switchTab(2)" id="tab2">단위 변환</button>
    </div>

    <!-- 1. 랜덤 추천 기능 (7초 고정 + 이펙트) -->
    <div class="content-section active" id="section-random">
      <h2 id="title-random">🎯 랜덤 항목 추천 (7초 돌림판)</h2>
      <textarea id="random-items" rows="3" placeholder="추천할 항목들을 콤마(,)로 구분해서 적어주세요. 예: 짜장면, 짬뽕, 치킨, 피자"></textarea>
      <button class="main-btn" onclick="startRoulette()" id="btn-spin">추천 시작!</button>
      <div class="result-box" id="random-result">결과가 여기 표시됩니다.</div>
    </div>

    <!-- 2. 비밀번호 만들기 기능 (복사 버튼 옆으로 분리) -->
    <div class="content-section" id="section-password">
      <h2 id="title-password">🔒 안전한 비밀번호 생성기</h2>
      <button class="main-btn" onclick="generatePassword()" style="margin-bottom: 15px;" id="btn-gen-pass">비밀번호 만들기</button>
      <div class="input-group">
        <input type="text" id="password-output" readonly placeholder="생성된 비밀번호">
        <!-- 옆으로 빠진 복사하기 버튼 -->
        <button class="copy-btn" onclick="copyPassword()" id="btn-copy">복사</button>
      </div>
    </div>

    <!-- 3. 단위 변환 기능 (다양한 단위 대거 추가) -->
    <div class="content-section" id="section-unit">
      <h2 id="title-unit">⚖️ 스마트 단위 변환기</h2>
      <select id="unit-category" class="form-control" onchange="updateUnitOptions()">
        <option value="length">길이 (Length)</option>
        <option value="weight">무게 (Weight)</option>
        <option value="area">넓이 (Area)</option>
        <option value="volume">부피 (Volume)</option>
        <option value="temp">온도 (Temperature)</option>
      </select>
      
      <div class="unit-flex">
        <input type="number" id="unit-input" value="1" oninput="convertUnit()">
        <select id="unit-from" onchange="convertUnit()"></select>
        <span>➡️</span>
        <select id="unit-to" onchange="convertUnit()"></select>
      </div>
      <div class="result-box" id="unit-result">결과가 여기 표시됩니다.</div>
    </div>
  </div>

  <script>
    // --- 탭 전환 로직 ---
    function switchTab(index) {
      const tabs = document.querySelectorAll('.tab-btn');
      const sections = document.querySelectorAll('.content-section');
      tabs.forEach((tab, i) => {
        tab.classList.toggle('active', i === index);
        sections[i].classList.toggle('active', i === index);
      });
    }

    // --- 1. 랜덤 추천 기능 (7초 고정 및 이펙트) ---
    let rouletteInterval;
    function startRoulette() {
      const input = document.getElementById('random-items').value;
      const items = input.split(',').map(item => item.trim()).filter(item => item !== "");
      const resultBox = document.getElementById('random-result');
      const btn = document.getElementById('btn-spin');

      if (items.length === 0) {
        alert("항목을 입력해주세요!");
        return;
      }

      btn.disabled = true;
      let counter = 0;
      
      // 7초 동안 글자가 마구 고르는 것처럼 바뀌는 효과 (돌림판 느낌)
      rouletteInterval = setInterval(() => {
        const randomPick = items[Math.floor(Math.random() * items.length)];
        resultBox.innerText = `🤔 고르는 중... [ ${randomPick} ]`;
      }, 100);

      // 정확히 7초(7000ms) 뒤에 멈추고 결과 발표
      setTimeout(() => {
        clearInterval(rouletteInterval);
        const finalPick = items[Math.floor(Math.random() * items.length)];
        resultBox.innerHTML = `🎉 최종 결과: <span style="color:#2563eb; font-size:20px;">${finalPick}</span>`;
        btn.disabled = false;

        // 가장자리 예쁜 이펙트 발동!
        const effect = document.getElementById('edge-effect');
        effect.classList.add('trigger-effect');
        
        // 애니메이션 끝나면 클래스 제거해서 다음에도 쓸 수 있게 함
        setTimeout(() => {
          effect.classList.remove('trigger-effect');
        }, 2500);
      }, 7000);
    }

    // --- 2. 비밀번호 만들기 및 복사 (PC/모바일 대응) ---
    function generatePassword() {
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
      let password = "";
      for (let i = 0; i < 12; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById('password-output').value = password;
      const copyBtn = document.getElementById('btn-copy');
      copyBtn.innerText = currentLang === 'ko' ? '복사' : currentLang === 'en' ? 'Copy' : 'コピー';
    }

    function copyPassword() {
      const passwordInput = document.getElementById('password-output');
      const copyBtn = document.getElementById('btn-copy');

      if (!passwordInput.value) return;

      // 모바일과 PC 둘 다 완벽 지원하는 최신 복사 방식
      navigator.clipboard.writeText(passwordInput.value).then(() => {
        copyBtn.innerText = '✔️ OK';
        setTimeout(() => {
          copyBtn.innerText = currentLang === 'ko' ? '복사' : currentLang === 'en' ? 'Copy' : 'コピー';
        }, 1500);
      }).catch(err => {
        console.error("복사 실패: ", err);
      });
    }

    // --- 3. 단위 변환 기능 (단위 추가 및 수식 계산) ---
    const unitData = {
      length: { units: ['mm', 'cm', 'm', 'km', 'in', 'ft', 'yd'], rate: { mm: 0.001, cm: 0.01, m: 1, km: 1000, in: 0.0254, ft: 0.3048, yd: 0.9144 } },
      weight: { units: ['g', 'kg', 'lb', 'oz', '돈(don)', '냥(nyang)'], rate: { g: 1, kg: 1000, lb: 453.592, oz: 28.3495, '돈(don)': 3.75, '냥(nyang)': 37.5 } },
      area: { units: ['m²', 'km²', '평(pyeong)', 'ha', 'ac'], rate: { 'm²': 1, 'km²': 1000000, '평(pyeong)': 3.30578, ha: 10000, ac: 4046.86 } },
      volume: { units: ['mL', 'L', 'gal', 'cup', 'fl oz'], rate: { mL: 1, L: 1000, gal: 3785.41, cup: 200, 'fl oz': 29.5735 } },
      temp: { units: ['°C', '°F', 'K'] } // 온도는 공식 유도가 따로 필요함
    };

    function updateUnitOptions() {
      const category = document.getElementById('unit-category').value;
      const fromSelect = document.getElementById('unit-from');
      const toSelect = document.getElementById('unit-to');
      
      fromSelect.innerHTML = '';
      toSelect.innerHTML = '';

      unitData[category].units.forEach(unit => {
        fromSelect.add(new Option(unit, unit));
        toSelect.add(new Option(unit, unit));
      });

      // 기본값 설정 후 즉시 계산
      if(toSelect.options[1]) toSelect.selectedIndex = 1;
      convertUnit();
    }

    function convertUnit() {
      const category = document.getElementById('unit-category').value;
      const val = parseFloat(document.getElementById('unit-input').value);
      const from = document.getElementById('unit-from').value;
      const to = document.getElementById('unit-to').value;
      const resultBox = document.getElementById('unit-result');

      if (isNaN(val)) { resultBox.innerText = '숫자를 입력해 주세요.'; return; }

      // 온도 변환 예외 처리
      if (category === 'temp') {
        let celsius = 0;
        if (from === '°C') celsius = val;
        else if (from === '°F') celsius = (val - 32) * 5 / 9;
        else if (from === 'K') celsius = val - 273.15;

        let res = 0;
        if (to === '°C') res = celsius;
        else if (to === '°F') res = (celsius * 9 / 5) + 32;
        else if (to === 'K') res = celsius + 273.15;

        resultBox.innerText = `${val} ${from} = ${res.toFixed(2)} ${to}`;
        return;
      }

      // 그 외 일반 단위 변환 (기본값 기준 환산 방식)
      const rates = unitData[category].rate;
      const valInBase = val * rates[from]; // 기준 단위로 변경
      const finalVal = valInBase / rates[to]; // 대상 단위로 변경

      resultBox.innerText = `${val} ${from} = ${finalVal.toLocaleString(undefined, {maximumFractionDigits: 4})} ${to}`;
    }

    // --- 4. 언어 전환 기능 데이터 ---
    let currentLang = 'ko';
    const langPacks = {
      ko: { title: "미니 툴킷", tab0: "랜덤 추천", tab1: "비밀번호", tab2: "단위 변환", rTitle: "🎯 랜덤 항목 추천 (7초 돌림판)", rBtn: "추천 시작!", pTitle: "🔒 안전한 비밀번호 생성기", pBtn: "비밀번호 만들기", pCopy: "복사", uTitle: "⚖️ 스마트 단위 변환기" },
      en: { title: "Mini Toolkit", tab0: "Random", tab1: "Password", tab2: "Unit Converter", rTitle: "🎯 Random Picker (7s Roulette)", rBtn: "Spin Now!", pTitle: "🔒 Secure Password Generator", pBtn: "Generate", pCopy: "Copy", uTitle: "⚖️ Smart Unit Converter" },
      ja: { title: "ミニツール", tab0: "ランダム推薦", tab1: "パスワード", tab2: "単位変換", rTitle: "🎯 ランダムおすすめ (7秒回転)", rBtn: "スタート!", pTitle: "🔒 安全なパスワード生成器", pBtn: "パスワード生成", pCopy: "コピー", uTitle: "⚖️ スマート単位変換기" }
    };

    function changeLanguage(lang) {
      currentLang = lang;
      const p = langPacks[lang];
      
      document.getElementById('main-title').innerText = p.title;
      document.getElementById('tab0').innerText = p.tab0;
      document.getElementById('tab1').innerText = p.tab1;
      document.getElementById('tab2').innerText = p.tab2;
      document.getElementById('title-random').innerText = p.rTitle;
      document.getElementById('btn-spin').innerText = p.rBtn;
      document.getElementById('title-password').innerText = p.pTitle;
      document.getElementById('btn-gen-pass').innerText = p.pBtn;
      document.getElementById('btn-copy').innerText = p.pCopy;
      document.getElementById('title-unit').innerText = p.uTitle;
    }

    // 페이지 처음 열릴 때 초기화 세팅
    updateUnitOptions();
  </script>
</body>
</html>
