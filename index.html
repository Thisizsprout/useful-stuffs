<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Utility Hub</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary);
        }

        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            cursor: pointer;
        }

        /* 내비게이션 탭 */
        nav {
            display: flex;
            gap: 10px;
            max-width: 800px;
            width: 100%;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        nav button {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        nav button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 메인 컨텐츠 영역 및 애니메이션 */
        main {
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .tab-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 공통 입력 및 버튼 스타일 */
        input, textarea, select.tool-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
        }

        button.btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button.btn:hover {
            background: var(--primary-hover);
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: var(--bg-color);
            border-radius: 8px;
            font-weight: 500;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 계산기 격자 레이아웃 */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .calc-grid button {
            padding: 20px;
            font-size: 1.2rem;
            border: 1px solid var(--border);
            background: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
        }
        .calc-grid button:hover { background: var(--bg-color); }
        .calc-grid button.operator { color: var(--primary); font-weight: bold; }
        .calc-grid button.equal { background: var(--primary); color: white; grid-column: span 2; }

        /* 가로 배치 레이아웃용 */
        .flex-group {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="txt-title">멀티 유틸리티 허브</h1>
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ko">한국어</option>
            <option value="en">English</option>
        </select>
    </header>

    <nav id="nav-tabs">
        <!-- 자바스크립트에서 탭 버튼을 동적으로 생성합니다. -->
    </nav>

    <main>
        <!-- 1. 계산기 -->
        <div id="calc" class="tab-content">
            <h2 id="title-calc">🧮 계산기</h2>
            <input type="text" id="calc-display" readonly style="text-align: right; font-size: 1.5rem;">
            <div class="calc-grid">
                <button onclick="clearCalc()">C</button>
                <button onclick="inputCalc('/')" class="operator">/</button>
                <button onclick="inputCalc('*')" class="operator">*</button>
                <button onclick="inputCalc('-')" class="operator">-</button>
                <button onclick="inputCalc('7')">7</button>
                <button onclick="inputCalc('8')">8</button>
                <button onclick="inputCalc('9')">9</button>
                <button onclick="inputCalc('+')" class="operator">+</button>
                <button onclick="inputCalc('4')">4</button>
                <button onclick="inputCalc('5')">5</button>
                <button onclick="inputCalc('6')">6</button>
                <button onclick="inputCalc('.')">.</button>
                <button onclick="inputCalc('1')">1</button>
                <button onclick="inputCalc('2')">2</button>
                <button onclick="inputCalc('3')">3</button>
                <button onclick="inputCalc('0')">0</button>
                <button onclick="pressEqual()" class="equal">=</button>
            </div>
        </div>

        <!-- 2. 글자수 세기 -->
        <div id="counter" class="tab-content">
            <h2 id="title-counter">📝 글자수 세기</h2>
            <textarea id="counter-input" rows="8" placeholder="텍스트를 입력하세요..." oninput="countText()"></textarea>
            <div class="result-box" id="counter-result">
                공백 포함: 0자 | 공백 제외: 0자
            </div>
        </div>

        <!-- 3. 디데이 계산기 -->
        <div id="dday" class="tab-content">
            <h2 id="title-dday">📅 디데이 계산기</h2>
            <input type="date" id="dday-date" onchange="calculateDDay()">
            <div class="result-box" id="dday-result">날짜를 선택해 주세요.</div>
        </div>

        <!-- 4. 랜덤 추첨 -->
        <div id="random" class="tab-content">
            <h2 id="title-random">🎲 랜덤 추첨</h2>
            <textarea id="random-input" rows="4" placeholder="항목들을 콤마(,)나 줄바꿈으로 구분해서 입력하세요..."></textarea>
            <button class="btn" id="btn-draw" onclick="drawRandom()">추첨하기</button>
            <div class="result-box" id="random-result">결과가 여기에 표시됩니다.</div>
        </div>

        <!-- 5. BMI 계산기 -->
        <div id="bmi" class="tab-content">
            <h2 id="title-bmi">⚖️ BMI 계산기</h2>
            <div class="flex-group">
                <input type="number" id="bmi-height" placeholder="키 (cm)">
                <input type="number" id="bmi-weight" placeholder="몸무게 (kg)">
            </div>
            <button class="btn" id="btn-bmi" onclick="calcBMI()">계산하기</button>
            <div class="result-box" id="bmi-result">신체 스펙을 입력해 주세요.</div>
        </div>

        <!-- 6. 암호 생성기 -->
        <div id="password" class="tab-content">
            <h2 id="title-pwd">🔒 암호 생성기</h2>
            <input type="number" id="pwd-length" value="12" min="4" max="30" placeholder="암호 길이 (4~30)">
            <button class="btn" id="btn-pwd" onclick="generatePassword()">비밀번호 생성</button>
            <div class="result-box" id="pwd-result" style="font-family: monospace; font-size: 1.2rem; letter-spacing: 1px;">보안 암호가 여기에 표시됩니다.</div>
        </div>

        <!-- 7. 스톱워치 -->
        <div id="stopwatch" class="tab-content">
            <h2 id="title-stopwatch">⏱️ 스톱워치</h2>
            <div class="result-box" id="sw-time" style="font-size: 2rem; font-family: monospace;">00:00:00.00</div>
            <div class="flex-group" style="margin-top: 15px;">
                <button class="btn" id="btn-sw-start" onclick="startSW()">시작</button>
                <button class="btn" id="btn-sw-stop" onclick="stopSW()" style="background:#ef4444;">정지</button>
                <button class="btn" id="btn-sw-reset" onclick="resetSW()" style="background:#64748b;">리셋</button>
            </div>
        </div>

        <!-- 8. 단위 변환기 -->
        <div id="converter" class="tab-content">
            <h2 id="title-converter">🔄 단위 변환기 (길이)</h2>
            <div class="flex-group">
                <input type="number" id="convert-input" value="1" oninput="convertUnit()">
                <select id="convert-from" class="tool-input" style="width: 120px;" onchange="convertUnit()">
                    <option value="cm">cm</option>
                    <option value="m">m</option>
                    <option value="km">km</option>
                    <option value="inch">inch</option>
                </select>
            </div>
            <div class="result-box" id="converter-result">결과가 여기에 표시됩니다.</div>
        </div>
    </main>

    <script>
        // 다국어 데이터 번역 에러 없이 완전히 복구된 데이터 구조
        const langData = {
            ko: {
                title: "멀티 유틸리티 허브",
                calc: "🧮 계산기",
                counter: "📝 글자수 세기",
                dday: "📅 디데이 계산기",
                random: "🎲 랜덤 추첨",
                bmi: "⚖️ BMI 계산기",
                password: "🔒 암호 생성기",
                stopwatch: "⏱️ 스톱워치",
                converter: "🔄 단위 변환기",
                counterPlh: "텍스트를 입력하세요...",
                counterRes: "공백 포함: {inc}자 | 공백 제외: {exc}자",
                ddayPlh: "날짜를 선택해 주세요.",
                ddayToday: "오늘입니다! 🎉",
                randomPlh: "항목들을 콤마(,)나 줄바꿈으로 구분해서 입력하세요...",
                randomBtn: "추첨하기",
                randomRes: "결과가 여기에 표시됩니다.",
                bmiBtn: "계산하기",
                bmiRes: "신체 스펙을 입력해 주세요.",
                pwdBtn: "비밀번호 생성",
                pwdRes: "보안 암호가 여기에 표시됩니다.",
                swStart: "시작", swStop: "정지", swReset: "리셋",
                convRes: "결과가 여기에 표시됩니다."
            },
            en: {
                title: "Multi-Utility Hub",
                calc: "🧮 Calculator",
                counter: "📝 Word Counter",
                dday: "📅 D-Day Tracker",
                random: "🎲 Random Picker",
                bmi: "⚖️ BMI Calculator",
                password: "🔒 Pwd Generator",
                stopwatch: "⏱️ Stopwatch",
                converter: "🔄 Unit Converter",
                counterPlh: "Type or paste your text here...",
                counterRes: "With spaces: {inc} | Without spaces: {exc}",
                ddayPlh: "Please select a date.",
                ddayToday: "Today is the day! 🎉",
                randomPlh: "Enter items separated by commas or newlines...",
                randomBtn: "Pick Random",
                randomRes: "Result will be displayed here.",
                bmiBtn: "Calculate",
                bmiRes: "Please enter your height and weight.",
                pwdBtn: "Generate Password",
                pwdRes: "Secure password will appear here.",
                swStart: "Start", swStop: "Stop", swReset: "Reset",
                convRes: "Result will be displayed here."
            }
        };

        let currentLang = 'ko';
        const tabs = ['calc', 'counter', 'dday', 'random', 'bmi', 'password', 'stopwatch', 'converter'];

        // 탭 메뉴 초기화 및 동적 생성
        function initTabs() {
            const nav = document.getElementById('nav-tabs');
            nav.innerHTML = '';
            tabs.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.id = `nav-btn-${tab}`;
                btn.textContent = langData[currentLang][tab];
                btn.className = index === 0 ? 'active' : '';
                btn.onclick = () => switchTab(tab);
                nav.appendChild(btn);
            });
            switchTab(tabs[0]);
        }

        // 부드러운 화면 전환 효과가 적용된 탭 변경 기능
        function switchTab(tabId) {
            tabs.forEach(id => {
                const content = document.getElementById(id);
                const btn = document.getElementById(`nav-btn-${id}`);
                if (id === tabId) {
                    content.style.display = 'block';
                    setTimeout(() => content.classList.add('active'), 10);
                    if(btn) btn.classList.add('active');
                } else {
                    content.classList.remove('active');
                    content.style.display = 'none';
                    if(btn) btn.classList.remove('active');
                }
            });
        }

        // 언어 변경 기능
        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('txt-title').textContent = langData[lang].title;
            
            // 각 섹션 타이틀 업데이트
            tabs.forEach(tab => {
                document.getElementById(`title-${tab === 'password' ? 'pwd' : tab}`).textContent = langData[lang][tab];
                const navBtn = document.getElementById(`nav-btn-${tab}`);
                if (navBtn) navBtn.textContent = langData[lang][tab];
            });

            // 플레이스홀더 및 버튼 텍스트 변경
            document.getElementById('counter-input').placeholder = langData[lang].counterPlh;
            document.getElementById('random-input').placeholder = langData[lang].randomPlh;
            document.getElementById('btn-draw').textContent = langData[lang].randomBtn;
            document.getElementById('btn-bmi').textContent = langData[lang].bmiBtn;
            document.getElementById('btn-pwd').textContent = langData[lang].pwdBtn;
            document.getElementById('btn-sw-start').textContent = langData[lang].swStart;
            document.getElementById('btn-sw-stop').textContent = langData[lang].swStop;
            document.getElementById('btn-sw-reset').textContent = langData[lang].swReset;

            // 결과창 초기 문구 리셋
            countText();
            calculateDDay();
            convertUnit();
        }

        // 1. 계산기 로직
        let calcDisplay = document.getElementById('calc-display');
        function inputCalc(val) { calcDisplay.value += val; }
        function clearCalc() { calcDisplay.value = ''; }
        function pressEqual() {
            try {
                if(calcDisplay.value) calcDisplay.value = eval(calcDisplay.value);
            } catch(e) {
                calcDisplay.value = 'Error';
            }
        }

        // 2. 글자수 세기 로직
        function countText() {
            const text = document.getElementById('counter-input').value;
            const incSpaces = text.length;
            const excSpaces = text.replace(/\s/g, '').length;
            
            let template = langData[currentLang].counterRes;
            document.getElementById('counter-result').textContent = template.replace('{inc}', incSpaces).replace('{exc}', excSpaces);
        }

        // 3. 디데이 로직
        function calculateDDay() {
            const dateVal = document.getElementById('dday-date').value;
            const resBox = document.getElementById('dday-result');
            if(!dateVal) {
                resBox.textContent = langData[currentLang].ddayPlh;
                return;
            }
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(dateVal);
            target.setHours(0,0,0,0);
            
            const diffTime = target - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if(diffDays === 0) resBox.textContent = langData[currentLang].ddayToday;
            else if(diffDays > 0) resBox.textContent = `D-${diffDays}`;
            else resBox.textContent = `D+${Math.abs(diffDays)}`;
        }

        // 4. 랜덤 추첨 로직
        function drawRandom() {
            const input = document.getElementById('random-input').value;
            const resBox = document.getElementById('random-result');
            if(!input.trim()) {
                resBox.textContent = currentLang === 'ko' ? '항목을 입력해주세요.' : 'Please enter items.';
                return;
            }
            const items = input.split(/,|\n/).map(item => item.trim()).filter(item => item);
            const picked = items[Math.floor(Math.random() * items.length)];
            resBox.textContent = `🎉 ${picked} 🎉`;
        }

        // 5. BMI 계산기 로직
        function calcBMI() {
            const h = parseFloat(document.getElementById('bmi-height').value) / 100;
            const w = parseFloat(document.getElementById('bmi-weight').value);
            const resBox = document.getElementById('bmi-result');
            
            if(!h || !w) {
                resBox.textContent = langData[currentLang].bmiRes;
                return;
            }
            const bmi = (w / (h * h)).toFixed(1);
            let status = '';
            if(currentLang === 'ko') {
                if(bmi < 18.5) status = '저체중';
                else if(bmi < 23) status = '정상';
                else if(bmi < 25) status = '과체중';
                else status = '비만';
            } else {
                if(bmi < 18.5) status = 'Underweight';
                else if(bmi < 25) status = 'Normal';
                else if(bmi < 30) status = 'Overweight';
                else status = 'Obese';
            }
            resBox.textContent = `BMI: ${bmi} (${status})`;
        }

        // 6. 암호 생성기 로직
        function generatePassword() {
            const len = parseInt(document.getElementById('pwd-length').value) || 12;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let pwd = "";
            for (let i = 0; i < len; i++) {
                pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('pwd-result').textContent = pwd;
        }

        // 7. 스톱워치 로직
        let swInterval;
        let swStartTime;
        let swElapsedTime = 0;
        function startSW() {
            if(!swInterval) {
                swStartTime = Date.now() - swElapsedTime;
                swInterval = setInterval(updateSW, 10);
            }
        }
        function stopSW() {
            clearInterval(swInterval);
            swInterval = null;
        }
        function resetSW() {
            stopSW();
            swElapsedTime = 0;
            document.getElementById('sw-time').textContent = "00:00:00.00";
        }
        function updateSW() {
            swElapsedTime = Date.now() - swStartTime;
            let m = Math.floor(swElapsedTime / 60000);
            let s = Math.floor((swElapsedTime % 60000) / 1000);
            let ms = Math.floor((swElapsedTime % 1000) / 10);
            document.getElementById('sw-time').textContent = 
                `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
        }

        // 8. 단위 변환기 로직
        function convertUnit() {
            const val = parseFloat(document.getElementById('convert-input').value) || 0;
            const from = document.getElementById('convert-from').value;
            const resBox = document.getElementById('converter-result');
            
            let cm = 0;
            if(from === 'cm') cm = val;
            else if(from === 'm') cm = val * 100;
            else if(from === 'km') cm = val * 100000;
            else if(from === 'inch') cm = val * 2.54;

            const m = (cm / 100).toFixed(4);
            const km = (cm / 100000).toFixed(6);
            const inch = (cm / 2.54).toFixed(2);

            if(currentLang === 'ko') {
                resBox.innerHTML = `${cm} cm<br>${m} m<br>${km} km<br>${inch} inch`;
            } else {
                resBox.innerHTML = `${cm} cm<br>${m} m<br>${km} km<br>${inch} inch`;
            }
        }

        // 페이지 로드 시 초기화
        window.onload = () => {
            initTabs();
            changeLanguage('ko');
        };
    </script>
</body>
</html>
